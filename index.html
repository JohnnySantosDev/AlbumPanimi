<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Álbum Panini FIFA 2026</title>
<style>
  :root {
    --green:#00a651;--gold:#f5c400;--dark:#0a1628;--mid:#152a4a;
    --card:#1a3560;--text:#e8f0ff;--muted:#7a9cc4;--radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--dark);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}

  /* ── LOGIN SCREEN ── */
  #login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;padding:30px 20px;text-align:center;gap:20px;}
  #login-screen h1{font-size:1.5rem;color:var(--gold);font-weight:800;}
  #login-screen p{color:var(--muted);font-size:.9rem;max-width:280px;}
  .btn-google{display:flex;align-items:center;gap:12px;background:#fff;color:#333;
    border:none;border-radius:10px;padding:14px 24px;font-size:1rem;font-weight:600;
    cursor:pointer;box-shadow:0 2px 12px #0006;transition:transform .1s;}
  .btn-google:active{transform:scale(.96);}
  .btn-google svg{width:22px;height:22px;flex-shrink:0;}
  .trophy{font-size:4rem;}

  /* ── LOADING ── */
  #loading{display:none;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;gap:16px;color:var(--muted);}
  .spinner{width:40px;height:40px;border:4px solid var(--mid);border-top-color:var(--gold);
    border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ── APP ── */
  #app{display:none;}
  header{background:linear-gradient(135deg,#0d2b5e,#1a5276);padding:14px 16px 10px;
    position:sticky;top:0;z-index:100;border-bottom:2px solid var(--gold);}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .header-left h1{font-size:1.05rem;font-weight:700;color:var(--gold);}
  .header-left p{font-size:.72rem;color:var(--muted);}
  .user-info{display:flex;align-items:center;gap:8px;}
  .user-avatar{width:32px;height:32px;border-radius:50%;border:2px solid var(--gold);}
  .btn-logout{background:none;border:1px solid #2a4a7f;color:var(--muted);
    border-radius:8px;padding:5px 10px;font-size:.72rem;cursor:pointer;}
  .progress-bar{background:var(--mid);border-radius:20px;height:8px;overflow:hidden;margin-bottom:6px;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));
    border-radius:20px;transition:width .4s;}
  .progress-labels{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);}
  .pct{color:var(--gold);font-weight:700;}

  .tabs{display:flex;background:var(--mid);border-radius:var(--radius);padding:3px;margin:12px 12px 0;}
  .tab{flex:1;text-align:center;padding:8px 4px;border-radius:8px;font-size:.78rem;
    font-weight:600;cursor:pointer;color:var(--muted);border:none;background:none;}
  .tab.active{background:var(--gold);color:var(--dark);}

  .controls{padding:10px 12px;display:flex;gap:8px;align-items:center;}
  .search-wrap{flex:1;position:relative;}
  .search-wrap input{width:100%;background:var(--mid);border:1px solid #2a4a7f;
    border-radius:var(--radius);color:var(--text);padding:9px 12px 9px 34px;font-size:.85rem;outline:none;}
  .search-wrap input::placeholder{color:var(--muted);}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:.9rem;}
  select{background:var(--mid);border:1px solid #2a4a7f;border-radius:var(--radius);
    color:var(--text);padding:9px 8px;font-size:.78rem;outline:none;cursor:pointer;}

  #view-selecoes{padding:0 12px 80px;}
  .team-card{background:var(--card);border-radius:var(--radius);margin-bottom:10px;
    overflow:hidden;border:1px solid #2a4a7f;}
  .team-header{display:flex;align-items:center;padding:11px 14px;cursor:pointer;
    justify-content:space-between;gap:10px;}
  .team-flag{font-size:1.5rem;flex-shrink:0;}
  .team-info{flex:1;min-width:0;}
  .team-name{font-size:.9rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .team-code{font-size:.7rem;color:var(--muted);}
  .team-progress{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .team-pct{font-size:.8rem;font-weight:700;color:var(--gold);min-width:36px;text-align:right;}
  .mini-bar{width:60px;height:5px;background:var(--mid);border-radius:10px;overflow:hidden;}
  .mini-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));
    border-radius:10px;transition:width .3s;}
  .chevron{color:var(--muted);font-size:.8rem;transition:transform .2s;flex-shrink:0;}
  .team-card.open .chevron{transform:rotate(90deg);}

  .sticker-grid{display:none;grid-template-columns:repeat(4,1fr);gap:5px;padding:0 10px 10px;}
  .team-card.open .sticker-grid{display:grid;}
  .sticker{background:var(--mid);border-radius:8px;padding:7px 4px 5px;text-align:center;
    cursor:pointer;transition:transform .1s,background .15s;border:1.5px solid transparent;
    position:relative;user-select:none;-webkit-tap-highlight-color:transparent;}
  .sticker:active{transform:scale(.93);}
  .sticker.have{background:#1a4d2e;border-color:var(--green);}
  .sticker.foil{border-color:var(--gold);}
  .sticker.foil.have{background:#3d2e00;border-color:var(--gold);}
  .sticker-num{font-size:.65rem;color:var(--muted);}
  .sticker-name{font-size:.6rem;margin-top:2px;line-height:1.2;word-break:break-word;}
  .sticker-pos{font-size:.55rem;margin-top:3px;color:var(--muted);}
  .sticker-icon{font-size:.9rem;margin-bottom:1px;}
  .sticker.have .sticker-icon::after{content:'✅';}
  .sticker:not(.have) .sticker-icon::after{content:'⬜';}
  .sticker.foil .sticker-icon::after{content:'✨';}
  .sticker.foil.have .sticker-icon::after{content:'⭐';}

  #view-faltam,#view-tenho{padding:0 12px 80px;}
  .sticker-row{display:flex;align-items:center;background:var(--card);border-radius:9px;
    margin-bottom:7px;padding:10px 12px;gap:10px;cursor:pointer;border:1px solid #2a4a7f;transition:background .15s;}
  .sticker-row:active{background:#22457a;}
  .sticker-row .code{font-size:.75rem;font-weight:700;color:var(--gold);min-width:52px;}
  .sticker-row .info{flex:1;min-width:0;}
  .sticker-row .player{font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sticker-row .nation{font-size:.7rem;color:var(--muted);}
  .sticker-row .badge{font-size:1.1rem;}
  .empty-msg{text-align:center;color:var(--muted);padding:40px 20px;font-size:.9rem;}

  .bottom-stats{position:fixed;bottom:0;left:0;right:0;background:var(--mid);
    border-top:1px solid #2a4a7f;display:flex;padding:10px 0 max(10px,env(safe-area-inset-bottom));}
  .stat{flex:1;text-align:center;}
  .stat-val{font-size:1.1rem;font-weight:800;color:var(--gold);}
  .stat-lbl{font-size:.65rem;color:var(--muted);}

  /* sync indicator */
  .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);
    display:inline-block;margin-left:6px;vertical-align:middle;}
  .sync-dot.syncing{background:var(--gold);animation:pulse .6s infinite alternate;}
  .sync-dot.error{background:#e53e3e;}
  @keyframes pulse{to{opacity:.3;}}

  .badge-foil{background:#3d2e00;color:var(--gold);border-radius:4px;font-size:.6rem;padding:1px 4px;margin-left:4px;}
</style>
</head>

    {n:1,p:"Escudo",pos:"FOIL"},{n:2,p:"Josimar Dias",pos:"GK"},{n:3,p:"Kevin Bah",pos:"GK"},
    {n:4,p:"Stopira",pos:"DEF"},{n:5,p:"Roberto Lopes",pos:"DEF"},{n:6,p:"Diney",pos:"DEF"},
    {n:7,p:"Dylan Tavares",pos:"DEF"},{n:8,p:"Steven Fortes",pos:"DEF"},{n:9,p:"Jamiro Monteiro",pos:"MID"},
    {n:10,p:"Kenny Rocha Santos",pos:"MID"},{n:11,p:"Garry Rodrigues",pos:"MID"},{n:12,p:"Serginho",pos:"MID"},
    {n:13,p:"Foto do Time",pos:"FOTO"},{n:14,p:"Marco Soares",pos:"MID"},{n:15,p:"Ryan Mendes",pos:"ATA"},
    {n:16,p:"Djaniny",pos:"ATA"},{n:17,p:"Jovane Cabral",pos:"ATA"},{n:18,p:"Lisandro Semedo",pos:"ATA"},
    {n:19,p:"Gelson Fernandes",pos:"ATA"},{n:20,p:"Patrick Andrade",pos:"ATA"}]},
  {code:"NGA",name:"Nigéria",flag:"🇳🇬",stickers:[
    {n:1,p:"Escudo",pos:"FOIL"},{n:2,p:"Francis Uzoho",pos:"GK"},{n:3,p:"Daniel Akpeyi",pos:"GK"},
    {n:4,p:"W. Troost-Ekong",pos:"DEF"},{n:5,p:"Kenneth Omeruo",pos:"DEF"},{n:6,p:"Zaidu Sanusi",pos:"DEF"},
    {n:7,p:"Ola Aina",pos:"DEF"},{n:8,p:"Semi Ajayi",pos:"DEF"},{n:9,p:"Wilfred Ndidi",pos:"MID"},
    {n:10,p:"Frank Onyeka",pos:"MID"},{n:11,p:"Alex Iwobi",pos:"MID"},{n:12,p:"Joe Aribo",pos:"MID"},
    {n:13,p:"Foto do Time",pos:"FOTO"},{n:14,p:"Samuel Chukwueze",pos:"MID"},{n:15,p:"K. Iheanacho",pos:"ATA"},
    {n:16,p:"Emmanuel Dennis",pos:"ATA"},{n:17,p:"Taiwo Awoniyi",pos:"ATA"},{n:18,p:"Moses Simon",pos:"ATA"},
    {n:19,p:"Victor Osimhen",pos:"ATA"},{n:20,p:"Ademola Lookman",pos:"ATA"}]}
];

const TOTAL = TEAMS.reduce((s,t)=>s+t.stickers.length,0);
let state = {};
let currentUser = null;
let saveTimer = null;
let unsubscribe = null;

// ── FIREBASE AUTH ──
window.signIn = async () => {
  try {
    const provider = new GoogleAuthProvider();
    await signInWithRedirect(auth, provider);
  } catch(e) { alert('Erro ao entrar: ' + e.message); }
};

window.signOut = async () => {
  if(unsubscribe) unsubscribe();
  await fbSignOut(auth);
  state = {};
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
};

// Handle redirect result on page load
getRedirectResult(auth).catch(e => console.error('redirect error', e));

onAuthStateChanged(auth, async user => {
  if(user) {
    currentUser = user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('user-avatar').src = user.photoURL || '';
    await loadFromFirestore();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderTeams(TEAMS);
    updateGlobal();
    listenFirestore();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'none';
  }
});

async function loadFromFirestore() {
  try {
    const ref = doc(db, 'albums', currentUser.uid);
    const snap = await getDoc(ref);
    if(snap.exists()) state = snap.data().state || {};
    else state = {};
  } catch(e) { console.error(e); state = {}; }
}

function listenFirestore() {
  if(unsubscribe) unsubscribe();
  const ref = doc(db, 'albums', currentUser.uid);
  unsubscribe = onSnapshot(ref, snap => {
    if(snap.exists() && snap.metadata.hasPendingWrites === false) {
      state = snap.data().state || {};
      renderTeams(TEAMS);
      updateGlobal();
      if(currentView !== 'selecoes') applyFilters();
    }
  });
}

function setSyncStatus(status) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (status==='syncing'?' syncing':status==='error'?' error':'');
}

async function saveToFirestore() {
  if(!currentUser) return;
  setSyncStatus('syncing');
  try {
    const ref = doc(db, 'albums', currentUser.uid);
    await setDoc(ref, { state, updatedAt: new Date().toISOString() });
    setSyncStatus('ok');
  } catch(e) {
    setSyncStatus('error');
    console.error(e);
  }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToFirestore, 800);
}

// ── STATE ──
function key(code,n){ return `${code}_${n}`; }
function isHave(code,n){ return !!state[key(code,n)]; }
function toggle(code,n){
  const k = key(code,n);
  state[k] = !state[k];
  scheduleSave();
}
function countHave(){ return Object.values(state).filter(Boolean).length; }
function teamHave(code){
  const t = TEAMS.find(x=>x.code===code);
  return t ? t.stickers.filter(s=>isHave(code,s.n)).length : 0;
}

// ── RENDER ──
let currentView = 'selecoes';
window.setView = function(v) {
  currentView = v;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['selecoes','faltam','tenho'][i]===v);
  });
  document.getElementById('view-selecoes').style.display = v==='selecoes'?'block':'none';
  document.getElementById('view-faltam').style.display   = v==='faltam'?'block':'none';
  document.getElementById('view-tenho').style.display    = v==='tenho'?'block':'none';
  applyFilters();
};

function renderTeams(teams) {
  const c = document.getElementById('view-selecoes');
  c.innerHTML = '';
  if(!teams.length){c.innerHTML='<div class="empty-msg">Nenhuma seleção encontrada 🔍</div>';return;}
  teams.forEach(team=>{
    const have=teamHave(team.code), pct=Math.round(have/team.stickers.length*100);
    const div=document.createElement('div');
    div.className='team-card'; div.id='tc-'+team.code;
    div.innerHTML=`
      <div class="team-header" onclick="toggleTeam('${team.code}')">
        <span class="team-flag">${team.flag}</span>
        <div class="team-info">
          <div class="team-name">${team.name}</div>
          <div class="team-code">${team.code} · ${have}/20</div>
        </div>
        <div class="team-progress">
          <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
          <span class="team-pct">${pct}%</span>
        </div>
        <span class="chevron">›</span>
      </div>
      <div class="sticker-grid">${team.stickers.map(s=>stickerHTML(team.code,s)).join('')}</div>`;
    c.appendChild(div);
  });
}

function stickerHTML(code,s){
  const have=isHave(code,s.n), foil=s.pos==='FOIL';
  return `<div class="sticker${have?' have':''}${foil?' foil':''}" onclick="tapSticker('${code}',${s.n})" id="st-${code}-${s.n}">
    <div class="sticker-icon"></div>
    <div class="sticker-num">${code}-${s.n}</div>
    <div class="sticker-name">${s.p}</div>
    <div class="sticker-pos">${s.pos}</div>
  </div>`;
}

window.tapSticker = function(code,n){
  toggle(code,n);
  const el=document.getElementById(`st-${code}-${n}`);
  const team=TEAMS.find(t=>t.code===code), s=team.stickers.find(x=>x.n===n);
  if(el) el.className=`sticker${isHave(code,n)?' have':''}${s.pos==='FOIL'?' foil':''}`;
  updateTeamHeader(code);
  updateGlobal();
  if(currentView!=='selecoes') applyFilters();
};

window.toggleTeam = function(code){
  document.getElementById('tc-'+code)?.classList.toggle('open');
};

function updateTeamHeader(code){
  const team=TEAMS.find(t=>t.code===code), have=teamHave(code);
  const pct=Math.round(have/team.stickers.length*100);
  const card=document.getElementById('tc-'+code); if(!card) return;
  card.querySelector('.team-code').textContent=`${code} · ${have}/20`;
  card.querySelector('.team-pct').textContent=`${pct}%`;
  card.querySelector('.mini-fill').style.width=`${pct}%`;
}

function updateGlobal(){
  const have=countHave(), miss=TOTAL-have, pct=Math.round(have/TOTAL*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-count').textContent=`${have} / ${TOTAL}`;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('s-have').textContent=have;
  document.getElementById('s-miss').textContent=miss;
  document.getElementById('s-pct').textContent=pct+'%';
}

function renderList(containerId,items){
  const c=document.getElementById(containerId); c.innerHTML='';
  if(!items.length){c.innerHTML='<div class="empty-msg">Nenhuma figurinha aqui 🎉</div>';return;}
  items.forEach(({team,s})=>{
    const div=document.createElement('div'); div.className='sticker-row';
    div.onclick=()=>tapSticker(team.code,s.n);
    div.innerHTML=`
      <div class="code">${team.code}-${s.n}</div>
      <div class="info">
        <div class="player">${s.p}${s.pos==='FOIL'?'<span class="badge-foil">FOIL</span>':''}</div>
        <div class="nation">${team.flag} ${team.name} · ${s.pos}</div>
      </div>
      <div class="badge">${isHave(team.code,s.n)?'✅':'❌'}</div>`;
    c.appendChild(div);
  });
}

window.applyFilters = function(){
  const q=document.getElementById('search').value.toLowerCase();
  const pos=document.getElementById('pos-filter').value;
  const filtered=[];
  TEAMS.forEach(team=>{
    const tm=team.name.toLowerCase().includes(q)||team.code.toLowerCase().includes(q);
    const sts=team.stickers.filter(s=>{
      const nm=tm||s.p.toLowerCase().includes(q)||`${team.code}-${s.n}`.toLowerCase().includes(q);
      return nm&&(!pos||s.pos===pos);
    });
    if(sts.length) filtered.push({team,stickers:sts});
  });
  if(currentView==='selecoes'){
    if(!q&&!pos){renderTeams(TEAMS);return;}
    const c=document.getElementById('view-selecoes'); c.innerHTML='';
    filtered.forEach(({team,stickers})=>{
      const div=document.createElement('div'); div.className='team-card open'; div.id='tc-'+team.code;
      div.innerHTML=`
        <div class="team-header" onclick="toggleTeam('${team.code}')">
          <span class="team-flag">${team.flag}</span>
          <div class="team-info"><div class="team-name">${team.name}</div><div class="team-code">${team.code}</div></div>
          <span class="chevron">›</span>
        </div>
        <div class="sticker-grid">${stickers.map(s=>stickerHTML(team.code,s)).join('')}</div>`;
      c.appendChild(div);
    });
    if(!filtered.length) document.getElementById('view-selecoes').innerHTML='<div class="empty-msg">Nenhuma figurinha encontrada 🔍</div>';
  } else {
    const wantHave=currentView==='tenho', items=[];
    filtered.forEach(({team,stickers})=>stickers.forEach(s=>{
      if(isHave(team.code,s.n)===wantHave) items.push({team,s});
    }));
    renderList(currentView==='faltam'?'view-faltam':'view-tenho',items);
  }
};
</script>
